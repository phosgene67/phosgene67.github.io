<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arduino Board Icon -->
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="currentColor" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="70" height="70" fill="rgba(0,255,204,0.1)" rx="3"/>
  <!-- Microcontroller -->
  <rect x="40" y="35" width="20" height="20" fill="currentColor"/>
  <!-- Pin headers -->
  <circle cx="20" cy="45" r="2" fill="currentColor"/>
  <circle cx="20" cy="55" r="2" fill="currentColor"/>
  <circle cx="80" cy="45" r="2" fill="currentColor"/>
  <circle cx="80" cy="55" r="2" fill="currentColor"/>
  <!-- USB port -->
  <rect x="35" y="88" width="30" height="6" fill="currentColor"/>
</svg>